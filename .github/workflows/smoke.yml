name: smoke-test

on:
  # push:
  #   branches: ["main"]
  #   paths:
  #     - "src/**"
  #     - "test/**"
  #     - "deps.edn"
  #     - "manifest.scm"
  #     - ".github/workflows/smoke.yml"
  # pull_request:
  #   paths:
  #     - "src/**"
  #     - "test/**"
  #     - "deps.edn"
  #     - "manifest.scm"
  #     - ".github/workflows/smoke.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Guix store + profiles
        uses: actions/cache@v4
        with:
          path: |
            /gnu/store
            /var/guix/profiles
          key: guix-${{ hashFiles('manifest.scm') }}
          restore-keys: guix-

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('deps.edn') }}
          restore-keys: maven-

      - name: Setup Guix
        uses: PromyLoph/guix-install-action@v1.6

      - name: Run smoke test via Guix
        run: guix shell -m manifest.scm -- clojure -A:xtdb -M test/smoke_test.clj trials/samples/repo
